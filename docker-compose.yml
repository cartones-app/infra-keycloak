# ============================================================================
# infra-keycloak — Keycloak standalone para producción.
# ============================================================================
# Para desarrollo local usar el override:
#   docker compose -f docker-compose.yml -f docker-compose.local.yml up
#
# En prod:
#   - Postgres dedicado adentro del compose (volumen persistente).
#   - Keycloak: imagen propia pre-buildeada (Dockerfile), corre con
#     'start --optimized' (CMD por defecto). Themes horneados en la imagen.
#   - El realm de prod NO se importa en boot. Partir de
#     keycloak/realm-cartones.prod.json.example (template), copiarlo a
#     realm-cartones.prod.json (gitignoreado), customizar URLs/secretos
#     e importarlo UNA VEZ con `kc.sh import` o desde la UI admin.
#   - HTTPS asumido detrás de proxy (Cloudflare Tunnel + nginx-proxy en el
#     VPS, ver /data/notas/reference_vps_topology.md).
#
# Vars requeridas (ver .env.example):
#   KEYCLOAK_ADMIN_USER, KEYCLOAK_ADMIN_PASSWORD
#   KC_DB_USERNAME, KC_DB_PASSWORD
#   KC_HOSTNAME       (ej. keycloak.ncoders.solutions)
#   KEYCLOAK_HTTP_PORT (default 8080, expuesto solo al proxy)
# ============================================================================

services:
  keycloak-db:
    image: postgres:16-alpine
    container_name: keycloak_db
    restart: always
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: ${KC_DB_USERNAME:?KC_DB_USERNAME requerido}
      POSTGRES_PASSWORD: ${KC_DB_PASSWORD:?KC_DB_PASSWORD requerido}
    volumes:
      - keycloak_postgres_data:/var/lib/postgresql/data
    networks:
      - keycloak-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KC_DB_USERNAME} -d keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    # Imagen propia (ver Dockerfile). Hornea themes + corre `kc.sh build`
    # con KC_DB=postgres, health/metrics/proxy headers. Tag explícito para
    # poder pinearlo en deploys (no usamos :latest).
    build:
      context: .
      dockerfile: Dockerfile
      args:
        KEYCLOAK_VERSION: "26.1.4"
    image: cartones-app/keycloak:26.1.4
    # Evita que `docker compose pull` / `up` intente bajar la imagen de un
    # registry público (el tag `cartones-app/...` matchea el formato de
    # namespace de Docker Hub y dispara el pull). Solo se usa el build local.
    pull_policy: build
    container_name: keycloak
    restart: always
    # CMD por defecto de la imagen ya es `start --optimized`. El override
    # local lo pisa con start-dev.
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USER:?KEYCLOAK_ADMIN_USER requerido}
      # Requerimos password no-vacío SIEMPRE (nunca un default vacío en prod).
      # kc_admin_password.txt en el VPS guarda una contraseña fuerte permanente:
      # tras el primer boot KC ignora KC_BOOTSTRAP_ADMIN_* (el admin ya existe en
      # DB), así que los re-deploys son idempotentes sin necesidad de vaciarla.
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:?KEYCLOAK_ADMIN_PASSWORD requerido}

      # Base de datos
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: ${KC_DB_USERNAME}
      KC_DB_PASSWORD: ${KC_DB_PASSWORD}

      # HTTP (atrás de proxy en prod, no exponer directo a internet)
      KC_HTTP_PORT: 8080
      KC_HTTP_ENABLED: "true"
      KC_PROXY_HEADERS: xforwarded
      KC_HEALTH_ENABLED: "true"

      # Hostname público — debe matchear el dominio del Cloudflare Tunnel.
      # Define el claim `iss` de los JWT emitidos.
      KC_HOSTNAME: ${KC_HOSTNAME:?KC_HOSTNAME requerido}
      KC_HOSTNAME_STRICT: "true"

      # Importante en prod si la app cliente está en otro dominio.
      KC_HOSTNAME_BACKCHANNEL_DYNAMIC: "false"

      # Render del realm en boot: el docker-entrypoint.sh substituye estos
      # placeholders en realm-cartones.json.example y lo deja en
      # /opt/keycloak/data/import/, donde `start --import-realm` (CMD del
      # Dockerfile) lo importa de forma idempotente. Sin estas dos vars el
      # entrypoint salta el render y el realm `cartones` nunca se crea.
      FRONTEND_HOST: ${FRONTEND_HOST:?FRONTEND_HOST requerido}
      CLIENT_SECRET: ${CLIENT_SECRET:?CLIENT_SECRET requerido}
    # En prod los themes vienen horneados en la imagen (ver Dockerfile).
    # No bind-mount: cambios en ./keycloak/themes/ requieren rebuild de la imagen.
    ports:
      # Expuesto solo al loopback del host — el proxy reverso lo publica con
      # TLS al exterior (Cloudflare Tunnel → nginx-proxy → este puerto).
      - "127.0.0.1:${KEYCLOAK_HTTP_PORT:-8080}:8080"
    depends_on:
      keycloak-db:
        condition: service_healthy
    networks:
      - keycloak-internal
      - proxy
    # Healthcheck declarado en el Dockerfile (HEALTHCHECK directive).
    # Si se quiere overridear desde compose, descomentar:
    # healthcheck:
    #   test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000 && printf 'GET /health/ready HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && head -n 1 <&3 | grep -q '200'"]

volumes:
  keycloak_postgres_data:

networks:
  keycloak-internal:
  # Network externa compartida con los otros proyectos del VPS (nginx-proxy).
  # En local podés borrar este block o cambiarlo a internal.
  proxy:
    external: true
