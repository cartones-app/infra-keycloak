# ============================================================================
# Override de desarrollo local.
# ============================================================================
# Usar con:
#   docker compose -f docker-compose.yml -f docker-compose.local.yml up
#
# Diferencias vs prod:
#   - start-dev (HTTP, sin TLS, modo desarrollo).
#   - --import-realm: importa /opt/keycloak/data/import/*.json al boot.
#     Idempotente: si el realm ya existe, lo skipea.
#   - theme cache off: editás archivos en ./keycloak/themes/ y se reflejan
#     al recargar el browser (sin rebuild).
#   - KC_HOSTNAME=localhost para que el claim `iss` matchee con
#     http://localhost:8080/realms/cartones — los apps cliente locales lo esperan.
#   - Networks: pisamos la red `proxy` para que en local Compose la cree
#     automáticamente en vez de buscar la externa del VPS.
# ============================================================================

services:
  keycloak:
    command: start-dev --import-realm
    environment:
      KC_HOSTNAME: localhost
      KC_HOSTNAME_STRICT: "false"
      # NB: el base ya setea KC_HOSTNAME_BACKCHANNEL_DYNAMIC=false (sirve para
      # local también). El viejo KC_HOSTNAME_STRICT_BACKCHANNEL quedó deprecated
      # en KC 25 y es ignorado en 26.
      # Cache off para que los themes se recarguen sin restart.
      KC_SPI_THEME_STATIC_MAX_AGE: "-1"
      KC_SPI_THEME_CACHE_THEMES: "false"
      KC_SPI_THEME_CACHE_TEMPLATES: "false"
    volumes:
      # Realm (gitignoreado) generado a partir de realm-cartones.json.example.
      # OJO: si el archivo no existe en el host, Docker NO falla — crea un
      # directorio vacío en su lugar y KC tira un error críptico de
      # importación. Hacer `ls keycloak/realm-cartones.json` antes de up.
      - ./keycloak/realm-cartones.json:/opt/keycloak/data/import/realm-cartones.json:ro
      # Bind-mount de themes para hot-reload (en prod van horneados en la imagen).
      - ./keycloak/themes:/opt/keycloak/themes:ro

networks:
  # En prod `proxy` es la red externa del nginx-proxy en el VPS. En local no
  # existe esa network, así que la redeclaramos como no-externa: Compose la
  # crea automáticamente al levantar y nadie afuera necesita haberla creado
  # antes. El servicio sigue attacheado vía la definición del base compose.
  proxy:
    external: false
    name: infra_keycloak_proxy_local
