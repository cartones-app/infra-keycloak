# Theme custom 'cartones' para Keycloak.
#
# Hereda del theme 'base' (no de keycloak.v2) porque proveemos templates
# propios (template.ftl, login.ftl) con un layout split completamente
# distinto al del card centrado de v2. Heredar de v2 implicaría arrastrar
# todo el CSS de PatternFly que estaríamos peleando con !important para
# pisar.
#
# `base` provee:
#  - Templates Freemarker fallback para los flows que NO sobrescribimos
#    (verify-email, login-otp, idp-review-user-profile, etc.). Sin un
#    parent, esos flows romperían.
#  - Bundle de mensajes i18n (messages_es.properties, messages_en.properties).
parent=base

# Hojas de estilo del login. Solo la nuestra — no extendemos `parent.styles`
# porque `base` no trae CSS y queremos control total del look.
styles=css/login.css

# Nombre visible en el dropdown de "Themes" en realm settings.
displayName=Cartones

# Locales soportados — usamos los que `base` ya tiene definidos.
locales=es,en
