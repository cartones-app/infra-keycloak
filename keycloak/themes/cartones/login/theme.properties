# Theme custom 'cartones' para Keycloak.
# Hereda del theme 'keycloak.v2' (login moderno con tarjeta centrada).
# Sobreescribimos solo los recursos necesarios — el resto cae al parent.
parent=keycloak.v2

# Hojas de estilo cargadas además de las del parent. Orden importa:
# las nuestras van al final para tener mayor especificidad.
styles=css/login.css

# Nombre visible en el dropdown de "Themes" en realm settings.
displayName=Cartones

# Locales soportados (los heredamos, no agregamos).
locales=es,en
