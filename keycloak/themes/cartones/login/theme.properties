# Theme custom 'cartones' para Keycloak.
# Hereda del theme 'keycloak.v2' (login moderno con tarjeta centrada).
# Sobreescribimos solo los recursos necesarios — el resto cae al parent.
parent=keycloak.v2

# Hojas de estilo. `styles=` REEMPLAZA la lista del parent, no la extiende
# automáticamente — sin ${parent.styles} se pierden los CSS base de
# PatternFly v5 y el login queda sin formato. Concatenamos ambos: primero
# los del parent y al final el nuestro para mayor especificidad.
styles=${parent.styles} css/login.css

# Nombre visible en el dropdown de "Themes" en realm settings.
displayName=Cartones

# Locales soportados (los heredamos, no agregamos).
locales=es,en
